name: Bug Report
description: Report a bug in isotime
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Action...
        2. Observer...
        3. Error...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: input
    id: version
    attributes:
      label: Version / Environment
      placeholder: "e.g., v1.0.0, <os_platform [MacOS|Linux|Windows] />"
